name: Grafana
app_id: grafana
version: 13.1.0-1
upstream_version: 13.1.0
description: Data visualization and monitoring platform
long_description: |
  Grafana is an open-source platform for monitoring and observability. Create
  beautiful dashboards to visualize marine data from InfluxDB, Signal K, and
  other data sources.

  Features:
  - Rich visualization options (graphs, gauges, maps)
  - Multiple data source support
  - Alert notifications
  - Dashboard sharing and templating
  - Plugin ecosystem
homepage: https://grafana.com/
maintainer: Matti Airas <matti.airas@hatlabs.fi>
license: AGPL-3.0
tags:
  - role::container-app
  - field::marine
  - category::visualization
  - category::monitoring
  - interface::web
  - use::monitoring
  - works-with::logfile
debian_section: web
architecture: all
depends:
  - docker.io (>= 20.10) | docker-ce (>= 20.10)
recommends:
  - marine-influxdb-container
web_ui:
  enabled: true
  path: /
  port: 3000  # Internal Grafana port (Traefik routes here)
  protocol: http
  visible: true
routing:
  auth:
    # Grafana authenticates users itself via Authelia OIDC (native OAuth), so
    # there is no Traefik edge gate; mode: oidc wires the Authelia client
    # scaffolding (secret provisioning, snippet, unit ordering) declaratively.
    mode: oidc
    oidc:
      client_name: Grafana
      token_endpoint_auth_method: client_secret_basic
      scopes: [openid, profile, email, groups]
      consent_mode: implicit
      redirect:
        style: port  # Grafana derives its redirect from the external HTTPS port
        path: /login/generic_oauth
      env:
        GRAFANA_OIDC_CLIENT_SECRET: secret
        HALOS_EXTERNAL_PORT: external_port
layout:
  priority: 50
  width: 2
  height: 2
